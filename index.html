<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Optionx Hub &mdash; Kai_X</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root{
  --ft-salmon:#FFF1E0;--ft-red:#990F3D;--ft-blue:#0F5499;--ft-navy:#262A33;--ft-warm-blk:#33302E;
  --ft-border:#CCB799;--ft-mid:#8D775F;--ft-muted:#66605A;--ft-card-bg:#FFFAF4;--ft-card-bdr:#D4A96A;--ft-gold:#F0A500;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Georgia,'Times New Roman',serif;background:var(--ft-salmon);color:var(--ft-warm-blk);font-size:14px;line-height:1.5;}

.masthead{background:var(--ft-navy);color:#fff;padding:0 24px;border-bottom:4px solid var(--ft-red);position:sticky;top:0;z-index:5;}
.masthead-inner{max-width:1320px;margin:0 auto;padding:8px 0 6px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.masthead-eyebrow{font-family:Arial,sans-serif;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#AAAAAA;margin-bottom:2px;}
.masthead-title{font-size:1.25rem;font-weight:700;letter-spacing:-0.01em;}
.masthead-title span{color:var(--ft-gold);}
.hub-freshness{display:flex;gap:10px;flex-wrap:wrap;}
.hub-fresh-item{display:flex;align-items:center;gap:5px;font-family:Arial,sans-serif;}
.hub-fresh-dot{width:8px;height:8px;border-radius:50%;background:#3fce6e;box-shadow:0 0 0 3px rgba(63,206,110,0.25);flex:none;}
.hub-fresh-ts{font-size:0.66rem;color:#fff;}

nav.section-nav{background:var(--ft-navy);padding:0 24px;border-bottom:1px solid #44495A;}
nav.section-nav .nav-inner{max-width:1320px;margin:0 auto;display:flex;gap:0;overflow-x:auto;}
nav.section-nav button{font-family:Arial,sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  color:#AAAAAA;background:none;border:none;padding:10px 16px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;}
nav.section-nav button:hover{color:#fff;border-bottom-color:var(--ft-red);}
nav.section-nav button.active{color:#fff;border-bottom-color:var(--ft-red);}

main{max-width:1320px;margin:0 auto;padding:16px 24px 40px;}
section{display:none;}
section.active{display:block;}
.open-full{font-family:Arial,sans-serif;font-size:0.8rem;color:var(--ft-blue);text-decoration:none;font-weight:600;display:inline-block;margin-bottom:10px;}
.open-full:hover{text-decoration:underline;}
section iframe{width:100%;height:calc(100vh - 190px);min-height:600px;border:1px solid var(--ft-border);background:#fff;display:block;}

footer{background:var(--ft-navy);color:#888;font-family:Arial,sans-serif;font-size:11px;text-align:center;padding:16px 24px;margin-top:0;border-top:3px solid var(--ft-red);}

@media(max-width:700px){
  .masthead,nav.section-nav,main{padding-left:14px;padding-right:14px;}
  .masthead-eyebrow{display:none;}
  .masthead-title{font-size:1.05rem;}
}
</style>
</head>
<body>
<div class="masthead">
  <div class="masthead-inner">
    <div>
      <div class="masthead-eyebrow">Optionx Intelligence</div>
      <div class="masthead-title">Optionx <span>Hub</span></div>
    </div>
    <div class="hub-freshness">
      <div class="hub-fresh-item">
        <span class="hub-fresh-dot"></span>
        <div class="hub-fresh-ts">18 Jul 2026</div>
      </div>
    </div>
  </div>
</div>
<nav class="section-nav">
  <div class="nav-inner">
    <button class="active" data-target="evaluator">Evaluator</button>
    <button data-target="kaipf">Kai_PF</button>
    <button data-target="tradedesk">Trade Desk</button>
  </div>
</nav>
<main>
  <section id="evaluator" class="active">
    <a class="open-full" href="Eval_PF_180726_0930.html" target="_blank" rel="noopener">Open Evaluator in new tab &#8599;</a>
    <iframe src="Eval_PF_180726_0930.html" title="Evaluator"></iframe>
  </section>
  <section id="kaipf">
    <a class="open-full" href="Kai_OPTPF_180726_0928.html" target="_blank" rel="noopener">Open Kai_PF in new tab &#8599;</a>
    <iframe src="Kai_OPTPF_180726_0928.html" title="Kai_PF"></iframe>
  </section>
  <section id="tradedesk">
    <a class="open-full" href="trade-desk.html" target="_blank" rel="noopener">Open Trade Desk in new tab &#8599;</a>
    <iframe src="trade-desk.html" title="Trade Desk"></iframe>
  </section>
</main>
<footer>Optionx Hub &middot; Kai_X &middot; Built 18 Jul 2026</footer>
<script>
function showTab(name){
  document.querySelectorAll('main section').forEach(s=>s.classList.toggle('active', s.id===name));
  document.querySelectorAll('nav.section-nav button').forEach(b=>b.classList.toggle('active', b.dataset.target===name));
}
document.querySelectorAll('nav.section-nav button').forEach(b=>{
  b.addEventListener('click', ()=>showTab(b.dataset.target));
});
</script>
</body>
</html>
